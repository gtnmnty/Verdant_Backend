spring.application.name=salon-ecomm
spring.profiles.active=local

spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.pool-name=SalonEcommPool
spring.graphql.graphiql.enabled=true
# Set active profile via env var SPRING_PROFILES_ACTIVE or -Dspring.profiles.active
# e.g. local (for local dev), docker (for container), dev/prod etc.

security.jwt.secret-key=${JWT_SECRET}
security.jwt.expiration-time=${JWT_EXPIRATION}
security.jwt.refresh-expiration-time=604800000


spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile

spring.security.oauth2.client.registration.apple.client-id=${APPLE_CLIENT_ID}
spring.security.oauth2.client.registration.apple.client-secret=${APPLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.apple.scope=email,name

#Mail
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=bgwhiskey64@gmail.com
spring.mail.password=${APP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

spring.config.import=optional:file:.env[.properties]

# local
app.cors.allowed-origins=http://localhost:3000

# production
app.cors.allowed-origins=https://yourdomain.com