enum OrderStatus {
    PLACED
    PROCESSING
    IN_TRANSIT
    DELIVERED
    CANCELLED
}

enum PaymentStatus {
    PROCESSED
    PAID
    FAILED
    REFUNDED
    CANCELLED
}

enum OrderSortField {
    CREATED_AT
    TOTAL
}

enum SortDirection {
    ASC
    DESC
}

input OrderSortInput {
    field: OrderSortField = CREATED_AT
    direction: SortDirection = DESC
}

type OrderItem {
    id: ID!
    productId: ID
    productName: String!
    productImage: String
    productCategory: String
    quantity: Int!
    unitPrice: Float!
    subtotal: Float!
}

type OrderActivity {
    label: String!
    occurredAt: String
}

type OrderShippingAddress {
    line1: String
    line2: String
    city: String
    state: String
    postalCode: String
    country: String
}

type OrderSummary {
    id: ID!
    reference: String!
    customerName: String
    orderStatus: OrderStatus!
    paymentStatus: PaymentStatus!
    itemCount: Int!
    total: Float!
    placedAt: String!
    items: [OrderItem!]!
}

type OrderDetail {
    id: ID!
    reference: String!
    customerName: String
    orderStatus: OrderStatus!
    paymentStatus: PaymentStatus!
    paymentMethod: String!
    itemCount: Int!
    subtotal: Float!
    deliveryFee: Float!
    total: Float!
    notes: String
    placedAt: String!
    updatedAt: String
    items: [OrderItem!]!
    activity: [OrderActivity!]!
    shippingAddress: OrderShippingAddress
}

type OrderSummaryPage {
    content: [OrderSummary!]!
    page: Int!
    size: Int!
    totalElements: Int!
    totalPages: Int!
    hasNext: Boolean!
    hasPrevious: Boolean!
}

input OrderFilterInput {
    search: String
    status: OrderStatus
    page: Int = 0
    size: Int = 10
    sort: OrderSortInput
}

extend type Query {
    # ---- customer (client role) ----
    "My Orders page (image 1): recent orders, < 30 days old, 10/page, sortable."
    myOrders(page: Int = 0, size: Int = 10, sort: OrderSortInput): OrderSummaryPage!

    "View Older History (image 2): orders 30+ days old, 10/page, sortable."
    myOlderOrders(page: Int = 0, size: Int = 10, sort: OrderSortInput): OrderSummaryPage!

    "A single one of the current user's own orders."
    myOrder(orderId: ID!): OrderDetail!

    # ---- higher roles: admin, manager, receptionist ----
    "Orders table (image 3): paged (10/page), filterable by status/search, sortable."
    orders(filter: OrderFilterInput): OrderSummaryPage!

    "Order detail view (image 4), reached via row '...' -> View details."
    order(orderId: ID!): OrderDetail!
}
