extend type Query {
    me: User!
}

extend type Mutation {
    updateProfile(input: UpdateProfileInput!): User!
}

type User {
    id: ID!
    fullName: String!
    email: String!
    phone: String
    shippingAddress: Address
    avatarUrl: String
    savedPaymentMethod: PaymentMethodSummary
    createdAt: DateTime!
    cart: Cart
}

type PaymentMethodSummary {
    brand: String!
    last4: String!
}

input UpdateProfileInput {
    fullName: String
    phone: String
    email: String
    shippingAddress: AddressInput
}

type Cart {
    items: [CartItem!]!
    totalItems: Int!
    subtotal: BigDecimal!
}

type CartItem {
    id: ID!
    product: Product!
    quantity: Int!
    deliveryOption: String!
}
