extend type Query {
    services(
        category: String
        sort: ServiceSort = NEWEST
        page: Int = 1
        pageSize: Int = 6
    ): ServicePage!
    service(id: ID!): SalonService
    adminServices(
        category: String
        search: String
        sort: CollectionSort = NEWEST
        status: CollectionStatus
        page: Int = 1
        pageSize: Int = 6
    ): AdminServicePage!
    adminService(id: ID!): AdminServiceDto
    favorites(first: Int = 10, after: String): CatalogItemConnection!
}

enum ServiceSort {
    NEWEST
    OLDEST
    PRICE_LOW_TO_HIGH
    PRICE_HIGH_TO_LOW
    DURATION_HIGH_TO_LOW
    DURATION_LOW_TO_HIGH
}

type ServicePage{
    items: [SalonService!]!
    page: Int!
    pageSize: Int!
    totalItems: Int!
    totalPages: Int!
}

type AdminServicePage{
    items: [AdminServicePage!]!
    page: Int!
    pageSize: Int!
    totalItems: Int!
    totalPages: Int!
}

type SalonService implements CatalogItem {
    id: ID!
    name: String!
    subName: String!
    description: String
    category: String!
    price: BigDecimal!
    durationMinutes: Int!
    reviewCount: Int!
    averageRating: Float!
    isFeatured: Boolean!
    isHomeService: Boolean!
    badge: String
    tags: [String!]!
    info: [String!]!
    images: [MediaImage!]!
    isFavorited: Boolean!
    stylists: [Stylist!]!
}

type AdminServiceDto{
    id: ID!
    name: String!
    category: String!
    description: String
    price: BigDecimal!
}

input CreateServiceInput{
    name: String!
    category: String!
    description: String
    price: BigDecimal!
}

input UpdateServiceInput{
    id: ID!
    name: String!
    category: String!
    description: String
    price: BigDecimal!
}