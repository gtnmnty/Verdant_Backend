extend type Query {
    services(
        category: String
        sort: ServiceSort = NEWEST
        page: Int = 1
        pageSize: Int = 6
    ): ServicePage!
    service(id: ID!): SalonService
    adminServices(
        category: String
        search: String
        sort: CollectionSort = NEWEST
        status: CollectionStatus
        page: Int = 1
        pageSize: Int = 6
    ): AdminServicePage!
    adminService(id: ID!): AdminServiceDto
    serviceFavorites(first: Int = 10, after: String): CatalogItemConnection!
}

extend type Mutation {
    createService(input: CreateServiceInput!): AdminServiceDto!
    updateService(input: UpdateServiceInput!): AdminServiceDto!
    deleteService(id: ID!): AdminServiceDto!
}

enum ServiceSort {
    NEWEST
    OLDEST
    PRICE_LOW_TO_HIGH
    PRICE_HIGH_TO_LOW
    DURATION_HIGH_TO_LOW
    DURATION_LOW_TO_HIGH
}

type ServicePage {
    items: [SalonService!]!
    page: Int!
    pageSize: Int!
    totalItems: Int!
    totalPages: Int!
}

type AdminServicePage {
    items: [AdminServiceDto!]!
    page: Int!
    pageSize: Int!
    totalItems: Int!
    totalPages: Int!
}

type SalonService implements CatalogItem {
    id: ID!
    name: String!
    subName: String!
    catalog: ItemCatalog!
    price: BigDecimal!
    durationInMinutes: Int!
    description: String
    badge: String
    tags: [String!]!
    info: [String!]!
    reviewCount: Int!
    averageRating: Float!
    isHomeService: Boolean!
    isFeatured: Boolean!
    images: [MediaImage!]!
    primaryImage: MediaImageDto
    stylists: [Stylist!]!
    isFavorited: Boolean!
}

type AdminServiceDto {
    id: ID!
    name: String!
    subName: String!
    category: String!
    price: BigDecimal!
    durationInMinutes: Int!
    status: CollectionStatus!
    description: String
    badge: String
    tags: [String!]!
    info: [String!]!
    reviewCount: Int!
    averageRating: Float!
    isHomeService: Boolean!
    isFeatured: Boolean!
    images: [MediaImage!]!
    stylists: [Stylist!]!
    createdAt: DateTime
    updatedAt: DateTime
}

input CreateServiceInput {
    name: String!
    subName: String!
    category: ItemCatalog!
    price: BigDecimal!
    durationInMinutes: Int!
    status: CollectionStatus!
    description: String
    badge: String
    tags: [String!]!
    info: [String!]!
    images: [String!]!
    isHomeService: Boolean!
    isFeatured: Boolean!
    stylistIds: [ID!]!
}

input UpdateServiceInput {
    id: ID!
    name: String
    subName: String
    category: ItemCatalog
    price: BigDecimal
    durationInMinutes: Int
    status: CollectionStatus
    description: String
    badge: String
    tags: [String!]
    info: [String!]
    images: [String!]
    isHomeService: Boolean
    isFeatured: Boolean
    stylistIds: [ID!]
}