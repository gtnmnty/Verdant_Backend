scalar DateTime
scalar BigDecimal

type PageInfo {
    hasNextPage: Boolean!
    endCursor: String
}

enum CollectionStatus {
    ACTIVE
    INACTIVE
}

enum ItemType {
    PRODUCT
    SALON_SERVICE
}

enum ItemCatalog {
    SKIN_CARE
    HAIR_CARE
    MAKE_UP
}

type Address {
    line1: String!
    line2: String
    city: String!
    state: String!
    postal: String!
    country: String
}

input AddressInput {
    line1: String!
    line2: String
    city: String!
    state: String!
    postal: String!
    country: String!
}

interface CatalogItem {
    id: ID!
    name: String!
    description: String
    catalog: ItemCatalog!
    price: BigDecimal!
    reviewCount: Int!
    averageRating: Float!
    badge: String
    tags: [String!]!
    info: [String!]!
    images: [MediaImage!]!
    isFavorited: Boolean!
}

type MediaImage {
    id: ID!
    url: String!
    publicId: String!
    isPrimary: Boolean!
    sortOrder: Int
}
