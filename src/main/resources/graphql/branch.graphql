enum BranchStatus {
    OPEN
    CLOSED
}

type BranchAddressDto {
    line1: String
    line2: String
    city: String
    state: String
    postal: String
    country: String
}

input BranchAddressInput {
    line1: String
    line2: String
    city: String
    state: String
    postal: String
    country: String
}

type OperatingHours {
    days: String
    open: String
    close: String
}

input OperatingHoursInput {
    days: String
    open: String
    close: String
}

type Branch {
    id: ID!
    name: String!
    address: BranchAddressDto
    phone: String
    email: String
    operatingHours: OperatingHours
    googleMapsUrl: String
    imageUrl: String
    status: BranchStatus!
}

type AdminBranchDto {
    id: ID!
    name: String!
    address: BranchAddressDto
    phone: String
    email: String
    operatingHours: OperatingHours
    googleMapsUrl: String
    imageUrl: String
    status: BranchStatus!
    createdAt: String
    updatedAt: String
}

type AdminBranchPage {
    items: [AdminBranchDto!]!
    page: Int!
    pageSize: Int!
    totalItems: Int!
    totalPages: Int!
}

input CreateBranchInput {
    name: String!
    address: BranchAddressInput
    phone: String
    email: String
    operatingHours: OperatingHoursInput
    googleMapsUrl: String
    imageUrl: String
    status: BranchStatus
}

input UpdateBranchInput {
    id: ID!
    name: String
    address: BranchAddressInput
    phone: String
    email: String
    operatingHours: OperatingHoursInput
    googleMapsUrl: String
    imageUrl: String
    status: BranchStatus
}

extend type Query {
    adminBranches(
        status: BranchStatus
        search: String
        page: Int = 1
        pageSize: Int = 10
    ): AdminBranchPage!

    adminBranch(id: ID!): AdminBranchDto!
}

extend type Mutation {
    createBranch(input: CreateBranchInput!): AdminBranchDto!
    updateBranch(input: UpdateBranchInput!): AdminBranchDto!
    deleteBranch(id: ID!): AdminBranchDto!
}
