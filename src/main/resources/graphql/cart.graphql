extend type Query {
    myCart: Cart!
    selectedCart(input: SelectedCartItemsInput!): Cart!
}

extend type Mutation {
    addToCart(input: AddToCartInput!): Cart!
    updateCartItemQuantity(input: UpdateQuantityInput!): Cart!
    updateCartItemDeliveryOption(input: UpdateDeliveryOptionInput!): Cart!
    removeCartItems(input: RemoveCartItemsInput!): Cart!
}

type Cart {
    items: [CartItem!]!
    totalItems: Int!
    subtotal: BigDecimal!
}

type CartItem {
    id: ID!
    product: CartItemSummaryDto!
    quantity: Int!
    deliveryOption: DeliveryOption!
}

type CartItemSummaryDto{
    id: ID!,
    name: String,
    itemCatalog: ItemCatalog
    price: BigDecimal!
    salePrice: BigDecimal
    image: String
    isFavorite: Boolean!
}

input AddToCartInput {
    productId: ID!
    quantity: Int = 1
    deliveryOption: DeliveryOption!
}

input UpdateQuantityInput {
    cartItemId: ID!
    quantity: Int!
}

input UpdateDeliveryOptionInput {
    cartItemId: ID!
    deliveryOption: DeliveryOption!
}

input RemoveCartItemsInput {
    cartItemIds: [ID!]!
}

input SelectedCartItemsInput {
    cartItemIds: [ID!]!
}

enum ItemCatalog {
    SKIN_CARE,
    HAIR_CARE,
    MAKE_UP
}

enum DeliveryOption {
    STANDARD
    EXPRESS
    SAME_DAY
}
